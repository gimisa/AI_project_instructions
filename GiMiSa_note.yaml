# =================================================================
# 2. UNIVERSAL ARCHITECTURAL RULES
# =================================================================
UNIVERSAL_LESSONS:

  # Inheritance and Memory Management
  Memory_Management:
    - Key: Successor_Relay
      Value: AI must validate this file and act as 'Editor & Owner of GiMiSa_note.yaml'.
      Priority: MAXIMUM
    - Key: Densification_Strategy
      Value: **NO full sentences.** Use keywords and dense YAML to save context window tokens.
      Importance: CRITICAL
    - Key: Full_Restitution
      Value: On request, AI MUST output the entire updated YAML content without truncation.
      Importance: CRITICAL

  # Code Quality & Execution Environment
  Code_Robustness:
    - Key: Master_Debug_Modularity
      Value: Short master file + generic modules. Debugging toggled via Boolean (True/False).
    - Key: Try_Block_Exhaustiveness
      Value: Mandatory `except` or `finally` after every `try`.
    - Key: Hardware_Validation_V1.0
      Value: AI MUST check hardware (GPU/NVIDIA) before suggesting heavy libs (PyTorch/TF).
      Action: If no GPU, provide CPU-specific install commands (e.g., --index-url for torch).
    - Key: Reversible_Installation
      Value: Use `requirements.txt` and provide `uninstall` command for every new dependency.

  # Data Protocols
  Data_Handling:
    - Key: Hardcoding_Prohibition
      Value: Zero hardcoded data (datamock). Use external YAML/JSON/CSV.
    - Key: PANDAS_Prohibition
      Value: Absolute ban on PANDAS for static data reading/prep (Use Native Python).
    - Key: Strict_IO_Contract
      Value: Validate data at entry point (Validator). Raise explicit Exception on failure.
      Rule: NEVER return default values (0/None) on data errors. Break execution.

# =================================================================
# 3. SESSION & COLLABORATION PROTOCOLS
# =================================================================
SESSION_MANAGEMENT:

  - Key: Initialization_Protocol
    Procedure: AI must ask for (1) GiMiSa_note.yaml and (2) Last session log before starting.
  
  - Key: Host_Identity_Validation
    Value: AI must monitor system prompt (ex: user@host). If host changes (SSH drop), STOP and alert.
    Importance: CRITICAL (Prevents running server commands on local laptop).

  - Key: Logic_Before_Code
    Value: Present logic in plain text first. WAIT for user validation before generating code.
    Importance: MAXIMUM (Saves time/tokens).

  - Key: Exclusive_YAML_Logs
    Value: All session summaries must be generated in dense YAML format for future injection.

# =================================================================
# 4. NETWORK & DEBUGGING (L3 SPECIALIZATION)
# =================================================================
DEBUG_PROTOCOLS:
  - Key: Visibility_Axiom
    Value: Visualization (tcpdump, real-time logs) must precede any configuration change.
  - Key: Anti_Gueswork_Strategy
    Value: If a simple fix fails twice, deploy sniffers (tcpdump -i any) to locate flow rupture.
  - Key: TCPDUMP_Truth
    Value: Request without Reply = Routing or NAT failure. Use as final evidence.

